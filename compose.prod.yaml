services:
    app:
        build:
            context: .
            dockerfile: docker/8.5/Dockerfile
            target: production
        image: 'alumco-lms-app:latest'
        restart: unless-stopped
        environment:
            APP_ENV: production
            APP_DEBUG: false
            APP_KEY: '${APP_KEY}'
            QUEUE_CONNECTION: '${QUEUE_CONNECTION:-redis}'
            CACHE_STORE: '${CACHE_STORE:-redis}'
            RUN_LARAVEL_OPTIMIZE: 'true'
            RUN_MIGRATIONS: '${RUN_MIGRATIONS:-false}'
            DB_CONNECTION: mysql
            DB_HOST: mysql
            DB_PORT: 3306
            DB_DATABASE: '${DB_DATABASE}'
            DB_USERNAME: '${DB_USERNAME}'
            DB_PASSWORD: '${DB_PASSWORD}'
            REDIS_HOST: redis
            REDIS_PASSWORD: 'null'
            REDIS_PORT: 6379
        volumes:
            # Compartimos los archivos estáticos con el contenedor Nginx
            - app-files:/var/www/html
            # Cargamos el .env de producción para que Laravel tenga la configuración correcta
            - ./.env:/var/www/html/.env
        networks:
            - alumco-prod
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy
    queue:
        build:
            context: .
            dockerfile: docker/8.5/Dockerfile
            target: production
        image: 'alumco-lms-app:latest'
        restart: unless-stopped
        command: php artisan queue:work --tries=3 --sleep=3 --timeout=90
        environment:
            APP_ENV: production
            APP_DEBUG: false
            APP_KEY: '${APP_KEY}'
            QUEUE_CONNECTION: '${QUEUE_CONNECTION:-redis}'
            CACHE_STORE: '${CACHE_STORE:-redis}'
            RUN_LARAVEL_OPTIMIZE: 'false'
            RUN_MIGRATIONS: 'false'
            DB_CONNECTION: mysql
            DB_HOST: mysql
            DB_PORT: 3306
            DB_DATABASE: '${DB_DATABASE}'
            DB_USERNAME: '${DB_USERNAME}'
            DB_PASSWORD: '${DB_PASSWORD}'
            REDIS_HOST: redis
            REDIS_PASSWORD: 'null'
            REDIS_PORT: 6379
        volumes:
            - app-files:/var/www/html
            - ./.env:/var/www/html/.env
        networks:
            - alumco-prod
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy

    scheduler:
        build:
            context: .
            dockerfile: docker/8.5/Dockerfile
            target: production
        image: 'alumco-lms-app:latest'
        restart: unless-stopped
        command: >
            sh -c "while true; do
            php artisan schedule:run --no-interaction;
            sleep 60;
            done"
        environment:
            APP_ENV: production
            APP_DEBUG: false
            APP_KEY: '${APP_KEY}'
            QUEUE_CONNECTION: '${QUEUE_CONNECTION:-redis}'
            CACHE_STORE: '${CACHE_STORE:-redis}'
            RUN_LARAVEL_OPTIMIZE: 'false'
            RUN_MIGRATIONS: 'false'
            DB_CONNECTION: mysql
            DB_HOST: mysql
            DB_PORT: 3306
            DB_DATABASE: '${DB_DATABASE}'
            DB_USERNAME: '${DB_USERNAME}'
            DB_PASSWORD: '${DB_PASSWORD}'
            REDIS_HOST: redis
            REDIS_PASSWORD: 'null'
            REDIS_PORT: 6379
        volumes:
            - app-files:/var/www/html
            - ./.env:/var/www/html/.env
        networks:
            - alumco-prod
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy

    # Servidor web (Nginx)
    web:
        image: nginx:alpine
        restart: unless-stopped
        ports:
            # Exponemos la app en el puerto 8080
            - '${APP_PORT:-8080}:80'
        volumes:
            # Recibe el código desde el contenedor 'app'
            - app-files:/var/www/html
            # Su configuración para saber cómo enviar el tráfico a PHP
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        networks:
            - alumco-prod
        depends_on:
            - app

    # Base de datos (MySQL)
    mysql:
        image: 'mysql:8.4'
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            # Eliminamos MYSQL_ALLOW_EMPTY_PASSWORD por seguridad en producción
        volumes:
            - prod-mysql:/var/lib/mysql
            # No cargamos scripts de testing en producción
        networks:
            - alumco-prod
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}"]
            retries: 3
            timeout: 5s

    # Memoria cache y sistema de colas (Redis)
    redis:
        image: 'redis:alpine'
        restart: unless-stopped
        volumes:
            - prod-redis:/data
        networks:
            - alumco-prod
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            retries: 3
            timeout: 5s

networks:
    alumco-prod:
        driver: bridge

volumes:
    # Volumen temporal compartido entre PHP y Nginx
    app-files:
    # Volúmenes persistentes para que tus datos no se borren si el server reinicia
    prod-mysql:
        driver: local
    prod-redis:
        driver: local
