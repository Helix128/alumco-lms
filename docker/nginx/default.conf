server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /var/www/html/public; # La carpeta pública de Laravel

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    index index.php;

    charset utf-8;

    # Intenta servir el archivo (CSS/JS). Si no existe, manda la ruta a index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.svg { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    # Si es PHP, se lo pasamos al contenedor 'app' en el puerto 9000
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}